services:
  postgres-production:
    container_name: flexit-postgres-production
    image: postgres:16-alpine
    pull_policy: always
    env_file:
      - /opt/flex-it/env/postgres.production.env
    volumes:
      - postgres-production-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - production-network
    restart: unless-stopped

  backend-production:
    container_name: flexit-backend-production
    image: ${BACKEND_PRODUCTION_IMAGE:-ghcr.io/guilhermekelias/flex-it-backend:latest}
    pull_policy: always
    expose:
      - "${BACKEND_PORT:-3000}"
    env_file:
      - /opt/flex-it/env/backend.production.env
    depends_on:
      postgres-production:
        condition: service_healthy
    networks:
      - production-network
    restart: unless-stopped

  backend-migrations:
    image: ${BACKEND_PRODUCTION_IMAGE:-ghcr.io/guilhermekelias/flex-it-backend:latest}
    pull_policy: always
    command: ["npm", "run", "migration:run"]
    env_file:
      - /opt/flex-it/env/backend.production.env
    depends_on:
      postgres-production:
        condition: service_healthy
    networks:
      - production-network
    profiles:
      - maintenance
    restart: "no"

  frontend-production:
    container_name: flexit-frontend-production
    image: ${FRONTEND_PRODUCTION_IMAGE:-ghcr.io/guilhermekelias/flex-it-frontend:latest}
    pull_policy: always
    expose:
      - "${FRONTEND_PORT:-80}"
    networks:
      - production-network
    restart: unless-stopped

  nginx:
    container_name: flexit-nginx-gateway
    image: nginx:1.27-alpine
    pull_policy: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      PRODUCTION_SERVER_NAME: ${PRODUCTION_SERVER_NAME:?PRODUCTION_SERVER_NAME nao informado}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-25m}

      BACKEND_PRODUCTION_HOST: backend-production
      BACKEND_PORT: ${BACKEND_PORT:-3000}

      FRONTEND_PRODUCTION_HOST: frontend-production
      FRONTEND_PORT: ${FRONTEND_PORT:-80}
    volumes:
      - /opt/flex-it/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - /opt/flex-it/certbot/www:/var/www/certbot:ro
      - /opt/flex-it/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend-production
      - frontend-production
    networks:
      - production-network
    restart: unless-stopped

networks:
  production-network:

volumes:
  postgres-production-data:
