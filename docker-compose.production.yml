services:
  postgres-production:
    container_name: flexit-postgres-production
    image: postgres:16-alpine
    pull_policy: always
    env_file:
      - /opt/flex-it/env/postgres.production.env
    volumes:
      - postgres-production-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - production-network
    restart: unless-stopped

  backend-production:
    container_name: flexit-backend-production
    image: ghcr.io/guilhermekelias/flex-it-backend:latest
    pull_policy: always
    expose:
      - "3000"
    env_file:
      - /opt/flex-it/env/backend.production.env
    depends_on:
      postgres-production:
        condition: service_healthy
    networks:
      - production-network
    restart: unless-stopped

  backend-migrations:
    image: ghcr.io/guilhermekelias/flex-it-backend:latest
    pull_policy: always
    command: ["npm", "run", "migration:run"]
    env_file:
      - /opt/flex-it/env/backend.production.env
    depends_on:
      postgres-production:
        condition: service_healthy
    networks:
      - production-network
    profiles:
      - maintenance
    restart: "no"

  frontend-production:
    container_name: flexit-frontend-production
    image: ghcr.io/guilhermekelias/flex-it-frontend:latest
    pull_policy: always
    expose:
      - "80"
    networks:
      - production-network
    restart: unless-stopped

  nginx:
    container_name: flexit-nginx-gateway
    image: nginx:1.27-alpine
    pull_policy: always
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - /opt/flex-it/env/compose.production.env
    environment:
      BACKEND_PRODUCTION_HOST: backend-production
      FRONTEND_PRODUCTION_HOST: frontend-production
    volumes:
      - /opt/flex-it/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - /opt/flex-it/certbot/www:/var/www/certbot:ro
      - /opt/flex-it/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend-production
      - frontend-production
    networks:
      - production-network
    restart: unless-stopped

networks:
  production-network:

volumes:
  postgres-production-data:
