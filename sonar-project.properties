sonar.projectKey=guilhermekelias
sonar.organization=guilhermekelias
sonar.host.url=https://sonarcloud.io

sonar.sources=backend/src,frontend/src
sonar.tests=backend/src,frontend/src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.spec.tsx,**/*.test.tsx

sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**
sonar.coverage.exclusions=backend/src/main.ts,backend/src/**/*.module.ts,backend/src/database/data-source.ts,backend/src/database/migrations/**,frontend/src/main.tsx,frontend/src/vite-env.d.ts
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info
sonar.sourceEncoding=UTF-8
