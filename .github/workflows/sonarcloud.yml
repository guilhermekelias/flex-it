name: SonarCloud analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests with coverage
        working-directory: backend
        run: npm run test:cov

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Verify coverage reports
        run: |
          set -euo pipefail
          echo "Coverage files found:"
          find . \( -path "*/coverage/*" -o -name "lcov.info" \) -print

          test -s backend/coverage/lcov.info
          test -s frontend/coverage/lcov.info

          echo "Backend LCOV sample:"
          head -n 5 backend/coverage/lcov.info
          awk '/^SF:/ { print; if (++count == 5) exit }' backend/coverage/lcov.info
          echo "Frontend LCOV sample:"
          head -n 5 frontend/coverage/lcov.info
          awk '/^SF:/ { print; if (++count == 5) exit }' frontend/coverage/lcov.info

          grep -q "^SF:backend/src/" backend/coverage/lcov.info
          grep -q "^SF:frontend/src/" frontend/coverage/lcov.info
          ! grep -E "^SF:src[\\/]" backend/coverage/lcov.info
          ! grep -E "^SF:src[\\/]" frontend/coverage/lcov.info

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
