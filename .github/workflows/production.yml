name: Production deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/guilhermekelias/flex-it-backend
  FRONTEND_IMAGE: ghcr.io/guilhermekelias/flex-it-frontend

jobs:
  build-and-deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build and push backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend-production
          cache-to: type=gha,mode=max,scope=backend-production

      - name: Build and push frontend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend-production
          cache-to: type=gha,mode=max,scope=frontend-production

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || 'ec2-user' }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          : "${EC2_HOST:?EC2_HOST secret is required}"
          : "${EC2_USER:?EC2_USER secret is required}"
          : "${EC2_SSH_KEY:?EC2_SSH_KEY secret is required}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${EC2_SSH_KEY}" > ~/.ssh/flexit_ec2_key
          chmod 600 ~/.ssh/flexit_ec2_key
          ssh-keyscan -H "${EC2_HOST}" >> ~/.ssh/known_hosts

          scp -i ~/.ssh/flexit_ec2_key \
            -o StrictHostKeyChecking=yes \
            docker-compose.production.yml \
            "${EC2_USER}@${EC2_HOST}:/opt/flex-it/docker-compose.production.yml"

          ssh -i ~/.ssh/flexit_ec2_key \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=30 \
            "${EC2_USER}@${EC2_HOST}" 'bash -se' <<'DEPLOY'
          set -euo pipefail

          cd /opt/flex-it
          docker compose -f docker-compose.production.yml pull
          docker compose -f docker-compose.production.yml up -d
          docker image prune -f
          DEPLOY
